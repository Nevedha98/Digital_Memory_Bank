<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.container {
    background: white;
    padding: 30px;
    width: 90%;
    max-width: 350px;
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

/* INPUT */
.input-box {
    position: relative;
    margin: 15px 0;
}

.input-box i {
    position: absolute;
    left: 8px;
    top: 12px;
    color: gray;
}

.input-box input {
    width: 80%;
    padding: 10px 10px 10px 35px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    border-radius: 20px;
    border: none;
    background:linear-gradient(to right, #00bbff, #a011ff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

p {
    margin-top: 10px;
}

a {
    color: #ff0077;
    text-decoration: none;
}

body {
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            width: 90%;
            max-width: 350px;
        }

        /* 🔥 ADD THIS AT THE END */
        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            h1, h2 {
                font-size: 20px;
            }

            p {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Register</h2>

    <form method="POST">

        <div class="input-box">
            <i class="fas fa-user"></i>
            <input type="text" name="name" placeholder="Enter Name" required>
        </div>

        <div class="input-box">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="Enter Email" required>
        </div>

        <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Enter Password" required>
        </div>

        <button type="submit">Register</button>
    </form>

    <p>Already have account? <a href="/login">Login</a></p>
</div>

</body>
</html>
